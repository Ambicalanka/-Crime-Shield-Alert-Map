<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}">Home</a> |
        <a href="{{ url_for('report_crime') }}">Report Crime</a> |
        <a href="{{ url_for('route_safety') }}">Route Safety</a> |
        <a href="{{ url_for('alert') }}">Live Zone Checker</a> |
        <a href="{{ url_for('prediction_charts') }}">Crime Predictions</a> |
        <a href="{{ url_for('map_view') }}">Zone Map</a>
    </nav>
    <hr>
    <h2>Admin Login</h2>
    <form method="POST" action="/admin_login">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br><br>
        <button type="submit">Login</button>
    </form>
    {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
</body>
</html>
