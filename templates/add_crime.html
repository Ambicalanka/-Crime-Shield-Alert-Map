<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Crime Report</title>
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}">Home</a> |
        <a href="{{ url_for('report_crime') }}">Report Crime</a> |
        <a href="{{ url_for('route_safety') }}">Route Safety</a> |
        <a href="{{ url_for('alert') }}">Live Zone Checker</a> |
        <a href="{{ url_for('prediction_charts') }}">Crime Predictions</a> |
        <a href="{{ url_for('map_view') }}">Zone Map</a>
    </nav>
    <hr>
    <h2>Add Crime Report</h2>
    <form method="POST" action="/add_crime">
        <label for="zone">Zone:</label>
        <input type="text" id="zone" name="zone" required><br><br>
        <label for="crime_type">Crime Type:</label>
        <input type="text" id="crime_type" name="crime_type" required><br><br>
        <label for="count">Count:</label>
        <input type="number" id="count" name="count" required><br><br>
        <label for="year">Year:</label>
        <input type="number" id="year" name="year" value="2024" required><br><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
